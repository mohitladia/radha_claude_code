llm:
  provider: openai
  model: gpt-4o

embeddings:
  provider: openai
  model: text-embedding-3-small

chromadb:
  persist_dir: .radha/chromadb/
  collection_name: codebase

elasticsearch:
  url: http://localhost:9200
  index_name: codebase

rag:
  mode: hybrid

vector_store:
  provider: qdrant
  retrieval_mode: hybrid

qdrant:
  collection_name: ladiamohit92

memory:
  db_path: .radha/memory/memory.db
  summarize_at_tokens: 4000
  keep_last_messages: 20

skills:
  skills_dir: .radha/skills

logging:
  root_level: DEBUG
  file_path: .radha/logs/agent.log
  max_bytes: 10485760
  backup_count: 5
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  console: true

middleware:
  # Model call limits
  model_call_limit:
    enabled: true
    thread_limit: 100     # Max model calls per thread
    run_limit: 50         # Max model calls per run
    exit_behavior: "end"  # "end" | "error"

  # Model retry on failures
  model_retry:
    enabled: true
    max_retries: 3
    backoff_factor: 2.0
    initial_delay: 1.0
    max_delay: 60.0
    jitter: true
    retry_on: []          # Empty = all exceptions; specify types like "TimeoutError,ConnectionError"
    on_failure: "continue"  # "continue" | "error" | "formatter_func"

  # Model fallback if primary fails
  model_fallback:
    enabled: true
    fallback_models: []   # e.g., ["gpt-4o-mini", "gpt-3.5-turbo"] or model identifiers

  # Tool retry on failures
  tool_retry:
    enabled: true
    max_retries: 2
    backoff_factor: 2.0
    initial_delay: 1.0
    max_delay: 30.0
    jitter: true
    tools: []             # Empty = all tools; or specify tool names ["run_command", "search_codebase"]
    retry_on: []          # Empty = all exceptions; specify types like "TimeoutError,ConnectionError"
    on_failure: "continue"

  # PII Detection & Redaction
  pii:
    enabled: true
    action: "redact"              # redact | block | log_only
    scope: ["model_input", "model_output", "tool_input", "tool_output"]
    custom_patterns: []           # List of {name, regex, action, description}

  # Content Filter - Blocks prohibited content
  content_filter:
    enabled: true
    action: "block"               # block | log_only
    scope: ["model_input", "model_output", "tool_input", "tool_output"]
    custom_rules: []              # List of {name, regex, action, description, severity}